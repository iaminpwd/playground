---
# 1. K3s 기본 설치 및 설정
- name: K3s 마스터 설치 스크립트 실행
  shell: |
    curl -sfL https://get.k3s.io | sh -s - server \
    --node-ip={{ ansible_host }} \
    --flannel-iface=eth1 \
    --write-kubeconfig-mode 644
  args:
    creates: /usr/local/bin/k3s
  register: k3s_install_result
  notify: restart k3s 

- name: 마스터 노드 토큰 추출
  command: cat {{ k3s_token_path }}
  register: k3s_token
  changed_when: false

- name: 토큰 팩트 등록 
  set_fact:
    join_token: "{{ k3s_token.stdout }}"

- name: .kube 디렉터리 생성
  file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0755'

- name: K3s 설정 파일을 사용자 config로 복사
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/vagrant/.kube/config
    remote_src: true
    owner: vagrant
    group: vagrant
    mode: '0644'

- name: 환경 변수에 KUBECONFIG 등록
  lineinfile:
    path: /home/vagrant/.bashrc
    line: 'export KUBECONFIG=/home/vagrant/.kube/config'
    state: present

# 2. Helm 설치 및 메트릭 수집기 배포
- name: Helm 설치
  shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Helm 리포지토리 업데이트
  shell: |
    helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: kube-state-metrics 설치 (내부 데이터 생성용)
  shell: |
    helm upgrade --install kube-state-metrics prometheus-community/kube-state-metrics \
    --create-namespace \
    --namespace monitoring
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

# 3. 노드 라벨링
- name: 마스터가 모든 워커 노드를 순회하며 라벨링
  shell: "kubectl label node {{ item }} node-role=web --overwrite"
  loop: "{{ groups['web'] }}"
  delegate_to: master

- name: DB 그룹의 모든 노드 라벨링
  shell: "kubectl label node {{ item }} node-role=db --overwrite"
  loop: "{{ groups['db'] }}"
  delegate_to: master