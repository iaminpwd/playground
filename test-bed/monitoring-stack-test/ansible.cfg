[defaults]
inventory = ./inventory/hosts.ini
remote_user = vagrant
host_key_checking = false
roles_path = ./roles
retry_files_enabled = false
forks = 5
vault_password_file = .vault_pass

[privilege_escalatioin]
become = true
become_method = sudo
become_user = root
become_ask_pass = false

[ssh_connection]
pipelining = true
