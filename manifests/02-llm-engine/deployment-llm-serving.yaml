apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-llm-serving
  namespace: llmops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-serving
  template:
    metadata:
      labels:
        app: llm-serving
    spec:
      containers:
      - name: ollama-engine
        image: ollama/ollama:0.1.34
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 11434
          name: llm-port
        resources:
          requests:
            cpu: "2000m"
            memory: "8Gi" # Llama3 구동을 위한 로컬 PC 메모리 예약 (Guaranteed QoS)
          limits:
            cpu: "3500m"
            memory: "8Gi"
        lifecycle:
          postStart:
            exec:
              command: ["/bin/sh", "-c", "sleep 10 && ollama pull llama3"]