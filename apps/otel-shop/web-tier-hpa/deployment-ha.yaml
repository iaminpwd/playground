apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment # [수정] 서비스 이름(예: web-app, was-app)
spec:
  replicas: 2 # [확인] 노드 개수만큼 설정 권장(최소 2)
  selector:
    matchLabels:
      app: my-app # [수정] 아래 template 라벨과 일치 필수
  template:
    metadata:
      labels:
        app: my-app # [수정] 고유한 이름으로 관리
    spec:
      affinity:
        podAntiAffinity:
          # 강제 분산 규칙: 동일한 라벨의 파드가 같은 호스트에 뜨는 것을 방지
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - my-app # [수정] 위 matchLabels와 일치
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: my-app-container
        image: your-image-url:latest # [수정] 사용할 도커 이미지 주소
        ports:
        - containerPort: 80 # [수정] 컨테이너 내부 포트
        resources:
          requests:
            cpu: "100m" # [확인] 필요한 최소 CPU 양
            memory: "128Mi" # [확인] 필요한 최소 메모리