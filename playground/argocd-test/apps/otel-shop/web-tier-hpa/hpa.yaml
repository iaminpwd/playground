# otel-shop 웹 티어 HPA 설정
# CPU 사용률 60% 초과 시 자동으로 파드를 스케일 아웃합니다.
# requests.cpu가 반드시 설정되어 있어야 HPA가 정상 동작합니다.

# frontend 서비스 HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  # 최소 2개 유지 — Spot 노드 회수 시에도 서비스 중단 방지
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # CPU 사용률 60% 초과 시 스케일 아웃
          averageUtilization: 60
---
# frontend-proxy 서비스 HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-proxy-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-proxy
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
