# AWS EBS CSI Driver 배포 앱
# Prometheus, Grafana, Kubecost 등이 사용하는 PVC(영구 볼륨)를 AWS EBS gp3 디스크로 동적 할당합니다.
# sync-wave -1: PVC를 사용하는 다른 모든 앱보다 먼저 배포하여 스토리지 클래스를 미리 생성합니다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-ebs-csi-driver
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/aws-ebs-csi-driver
    chart: aws-ebs-csi-driver
    targetRevision: "*"
    helm:
      values: |
        controller:
          region: ap-northeast-2
          # EBS CSI 컨트롤러는 마스터 노드에 배치 (API 서버와 가까운 곳에서 볼륨 관리)
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
            - key: "node-role.kubernetes.io/master"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"
        node:
          # 모든 노드(Spot 포함)에서 EBS 볼륨을 마운트할 수 있도록 모든 taint 허용
          tolerations:
            - operator: "Exists"
        storageClasses:
          - name: gp3
            annotations:
              # 기본 스토리지 클래스로 설정하지 않음 (명시적 지정 필요)
              storageclass.kubernetes.io/is-default-class: "false"
            # 실제 PVC가 파드에 바인딩될 때 볼륨 생성 (비용 절약)
            volumeBindingMode: WaitForFirstConsumer
            reclaimPolicy: Delete
            parameters:
              type: gp3
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # CSIDriver 스펙은 컨트롤러가 자동으로 수정하므로 ArgoCD diff 무시
    - group: storage.k8s.io
      kind: CSIDriver
      name: ebs.csi.aws.com
      jsonPointers:
        - /spec/attachRequired
        - /spec/podInfoOnMount
        - /spec/volumeLifecycleModes
        - /spec/fsGroupPolicy
        - /spec/seLinuxMount
        - /spec/nodeAllocatableUpdatePeriodSeconds