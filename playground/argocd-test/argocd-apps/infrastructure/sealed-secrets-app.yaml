# Bitnami Sealed Secrets 컨트롤러 배포 앱
# SealedSecret 리소스를 실제 Secret으로 복호화하는 컨트롤러입니다.
# sync-wave 0: 다른 모든 앱보다 먼저 배포해야 합니다.
# 이 컨트롤러가 먼저 떠야 external-dns-secret, cloudflare-token 등 SealedSecret들이 복호화되어 Secret으로 생성됩니다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    # 앱 삭제 시 K8s에 배포된 리소스도 함께 정리
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.18.4
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      # Git에서 삭제된 리소스는 클러스터에서도 삭제
      prune: true
      # 클러스터 상태가 Git과 달라지면 자동으로 Git 상태로 복구
      selfHeal: true
    syncOptions:
      # kube-system 네임스페이스가 없으면 자동 생성
      - CreateNamespace=true
      # CRD처럼 큰 리소스 배포 시 충돌 방지를 위해 서버 단에서 병합
      - ServerSideApply=true