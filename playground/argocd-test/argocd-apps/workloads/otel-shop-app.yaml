# OpenTelemetry Demo(otel-shop) 전체를 Argo CD로 배포하는 Application입니다.
# Helm chart 본체와 이 저장소의 추가 매니페스트(apps/otel-shop)를 함께 조합합니다.
file_format: yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Argo CD에서 식별하는 애플리케이션 이름입니다.
  name: otel-shop
  namespace: argocd
  finalizers:
    # 앱 삭제 시 하위 리소스까지 함께 정리되도록 보장합니다.
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  ignoreDifferences:
    # Ingress finalizer/status는 컨트롤러가 동적으로 관리하므로 diff에서 제외합니다.
    - group: networking.k8s.io
      kind: Ingress
      jsonPointers:
        - /metadata/finalizers
        - /status
        - /metadata/generation
    # HPA가 replicas를 조정하므로 Deployment replica diff는 무시합니다.
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
        - /metadata/generation
  sources:
    # OpenTelemetry Demo 공식 Helm chart입니다.
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-demo
      targetRevision: "0.40.6"
      helm:
        values: |
          # 내장 모니터링 스택은 비활성화하고, 클러스터의 기존 Prometheus/Grafana를 사용합니다.
          prometheus:
            enabled: false
          grafana:
            enabled: false
          jaeger:
            enabled: false
          opensearch:
            enabled: false
          default:
            replicas: 1
            schedulingRules:
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                      - matchExpressions:
                          # dedicated 라벨이 없는 일반 워커 노드에만 스케줄링합니다.
                          - key: dedicated
                            operator: DoesNotExist
                          # control-plane / master 노드는 제외합니다.
                          - key: node-role.kubernetes.io/control-plane
                            operator: DoesNotExist
                          - key: node-role.kubernetes.io/master
                            operator: DoesNotExist
          components:
            ad:
              resources:
                requests:
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
            accounting:
              enabled: false
            cart:
              resources:
                requests:
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
            checkout:
              resources:
                requests:
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
            currency:
              resources:
                requests:
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
            email:
              resources:
                requests:
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
            flagd:
              resources:
                requests:
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
            frontend:
              resources:
                requests:
                  cpu: 100m
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
            fraud-detection:
              enabled: false
            image-provider:
              resources:
                requests:
                  ephemeral-storage: 128Mi
                limits:
                  ephemeral-storage: 512Mi
            kafka:
              resources:
                requests:
                  ephemeral-storage: 256Mi
                limits:
                  ephemeral-storage: 1Gi
            llm:
              enabled: false
            # 부하/트래픽 메트릭 유지를 위해 load-generator는 켜둡니다.
            load-generator:
              enabled: true
            payment:
              resources:
                requests:
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
            postgresql:
              resources:
                requests:
                  ephemeral-storage: 256Mi
                limits:
                  ephemeral-storage: 1Gi
            # ALB instance mode와 연동하기 위해 frontend-proxy는 NodePort를 사용합니다.
            frontend-proxy:
              service:
                type: NodePort
              resources:
                requests:
                  cpu: 100m
                  ephemeral-storage: 128Mi
                limits:
                  ephemeral-storage: 512Mi
            product-catalog:
              env:
                - name: PRODUCT_CATALOG_PORT
                  value: "8080"
                - name: FLAGD_HOST
                  value: flagd
                - name: FLAGD_PORT
                  value: "8013"
                - name: GOMEMLIMIT
                  value: 96MiB
                - name: DB_CONNECTION_STRING
                  value: postgres://otelu:otelp@postgresql/otel?sslmode=disable
                - name: OTEL_SEMCONV_STABILITY_OPT_IN
                  value: database
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: http://$(OTEL_COLLECTOR_NAME):4317
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                  ephemeral-storage: 128Mi
                limits:
                  memory: 128Mi
                  ephemeral-storage: 512Mi
            product-reviews:
              enabled: false
            quote:
              resources:
                requests:
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
            recommendation:
              resources:
                requests:
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
            shipping:
              resources:
                requests:
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
            valkey-cart:
              resources:
                requests:
                  ephemeral-storage: 64Mi
                limits:
                  ephemeral-storage: 256Mi
          opentelemetry-collector:
            enabled: true
            mode: deployment
            replicaCount: 1
            resources:
              requests:
                cpu: 50m
                memory: 50Mi
                ephemeral-storage: 128Mi
              limits:
                memory: 128Mi
                ephemeral-storage: 512Mi
            config:
              connectors:
                # trace를 metric으로 변환해 Prometheus로 보내기 위한 connector입니다.
                spanmetrics: {}
              exporters:
                # Prometheus OTLP endpoint로 메트릭을 전송합니다.
                otlphttp/prometheus:
                  endpoint: http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090/api/v1/otlp
                  tls:
                    insecure: true
                # 초기 문제 분석용 디버그 exporter입니다.
                debug:
                  verbosity: basic
              service:
                pipelines:
                  # spanmetrics가 생성한 메트릭을 Prometheus로 내보냅니다.
                  metrics:
                    receivers: [otlp, spanmetrics]
                    processors: [memory_limiter, batch]
                    exporters: [otlphttp/prometheus]
                  # trace는 debug와 spanmetrics 양쪽으로 보냅니다.
                  traces:
                    receivers: [otlp]
                    processors: [memory_limiter, batch]
                    exporters: [debug, spanmetrics]
    # 이 저장소의 otel-shop 추가 리소스(HPA, Ingress 등)를 함께 적용합니다.
    - repoURL: https://github.com/iaminpwd/argocd-test-repo.git
      targetRevision: main
      path: apps/otel-shop
  # 실제 배포 대상 클러스터/네임스페이스입니다.
  destination:
    server: https://kubernetes.default.svc
    namespace: otel-shop
  # Git 상태를 자동으로 반영하고, 네임스페이스가 없으면 생성합니다.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
