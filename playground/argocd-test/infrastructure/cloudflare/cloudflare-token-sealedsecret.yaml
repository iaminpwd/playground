# Cloudflare Tunnel 토큰을 암호화하여 Git에 안전하게 저장하는 SealedSecret
# TUNNEL_TOKEN은 Cloudflare 대시보드에서 발급한 터널 토큰을 kubeseal로 암호화한 값
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflare-token
  namespace: monitoring
spec:
  encryptedData:
    TUNNEL_TOKEN: 
  template:
    metadata:
      name: cloudflare-token
      namespace: monitoring
