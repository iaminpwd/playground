# Cloudflare API 토큰을 암호화하여 Git에 안전하게 저장하는 SealedSecret
# REPLACE_WITH_KUBESEAL_OUTPUT 부분을 kubeseal 명령어 출력값으로 교체해야 함
# kubeseal 사용 예시:
#   kubectl create secret generic external-dns-cloudflare \
#     --from-literal=apiToken=<YOUR_TOKEN> --dry-run=client -o yaml | \
#     kubeseal -o yaml > external-dns-cloudflare-sealedsecret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: external-dns-cloudflare
  namespace: kube-system
spec:
  encryptedData:
    # Cloudflare API 토큰 (kubeseal로 암호화된 값)
    # 필요 권한: Zone:DNS:Edit, Zone:Zone:Read
    apiToken: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: external-dns-cloudflare
      namespace: kube-system
    type: Opaque