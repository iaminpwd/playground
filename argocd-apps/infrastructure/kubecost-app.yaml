apiVersion: argoproj.io/v1alpha1
kind: Application

# [1. 메타데이터 및 삭제 정책]
# ArgoCD 앱의 기본 식별 정보를 정의합니다. 'finalizers'는 ArgoCD에서 이 앱을 지울 때,
# K8s에 배포되었던 실제 찌꺼기 리소스들까지 한 번에 깔끔하게 지워주는 안전장치 역할을 합니다.
metadata:
  name: kubecost
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default
  
  # [2. GitOps 동기화 예외 처리 (ignoreDifferences)]
  # K8s 운영 중 시스템에 의해 자동으로 변하는 값들(Helm 재시작 어노테이션, Service의 동적 할당 IP, 컨트롤러가 수정하는 권한 룰 등)을 지정합니다. 
  # 이 설정이 없으면 ArgoCD가 Git 코드와 다르다며 무한 동기화(OutOfSync) 오류를 뿜게 됩니다.
  ignoreDifferences:
    - group: "apps"
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations
        - /spec/template/metadata/labels/helm-rollout-restarter
        - /metadata/annotations/helm-rollout-restarter
        - /spec/template/metadata/annotations/helm-rollout-restarter
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
      jsonPointers:
        - /rules

  # [3. 배포 소스 정의 (Multi-source 설정)]
  # 두 군데의 저장소를 합쳐서 배포하는 방식입니다. Kubecost의 공식 Helm 차트 원본(첫 번째)을 가져오되, 
  # 설정값은 팀의 Git 저장소(두 번째, $values)에 있는 커스텀 values.yaml을 덮어씌워 배포합니다. 
  sources:
    - chart: cost-analyzer
      repoURL: https://kubecost.github.io/cost-analyzer/
      targetRevision: 2.3.1
      helm:
        valueFiles:
          - $values/infrastructure/monitoring/kubecost/values.yaml
    - repoURL: https://github.com/iaminpwd/argocd-test-repo.git
      targetRevision: main
      ref: values
  
  # [4. 배포 목적지]
  # 리소스를 설치할 타겟 클러스터(내부 API 서버)와 네임스페이스(monitoring)를 지정합니다.
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  
  # [5. 자동화 및 동기화 정책]
  # Git 상태를 K8s에 자동으로 반영하는 설정 묶음입니다. 타겟 네임스페이스가 없으면 만들고(CreateNamespace), 충돌 방지를 위해 서버 단에서 적용(ServerSideApply)하며, Git에서 지워진 코드는 실제 환경에서도 지우고(prune), 누군가 수동으로 K8s 리소스를 고쳐도 Git 상태로 강제 원복(selfHeal)시킵니다.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true