# Cloudflare API 토큰 Secret 배포 앱
# SealedSecret으로 암호화된 Cloudflare API 토큰을 복호화하여 kube-system에 Secret으로 생성합니다.
# sync-wave 1: sealed-secrets 컨트롤러(wave 0)가 먼저 떠야 복호화가 가능하므로 그 이후에 배포합니다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/iaminpwd/argocd-test-repo.git
    targetRevision: main
    path: infrastructure/external-dns-secret
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true