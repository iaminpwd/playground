defaultDashboardsEnabled: false
defaultRules:
  create: false

prometheus:
  prometheusSpec:
    # OTLP 수신 기능 활성화 (OpenTelemetry Collector로부터 데이터를 받기 위함)
    enableFeatures:
      - otlp-write-receiver

    # 부팅 시 과거 데이터(WAL) 리플레이에 시간이 오래 걸리더라도, 
    # 쿠버네티스가 프로메테우스를 죽이고 재시작(CrashLoopBackOff)하지 않도록 2분(120초)의 대기 시간을 줍니다.
    livenessProbe:
      initialDelaySeconds: 120 
      periodSeconds: 10

    # 지표 수집 및 알람 룰 평가 주기
    scrapeInterval: "1m"
    evaluationInterval: "1m"
    
    # 모니터링 전용 노드에만 프로메테우스 파드가 뜨도록 제한 (스케줄링 격리)
    nodeSelector:
      dedicated: "monitoring"
      node.kubernetes.io/capacity-type: "on-demand"
    tolerations:
      - key: dedicated
        operator: Equal
        value: monitoring
        effect: NoSchedule
        
    # 외부 시스템 연동 시 이 클러스터의 데이터임을 알 수 있게 이름표 부착
    externalLabels:
      cluster_id: "finops-k3s"
      
    # 데이터 보관 정책 (7일이 지나거나, 4GB를 넘으면 오래된 데이터부터 삭제)
    retention: 7d
    retentionSize: "4GB"

    # CPU를 아주 약간 더 쓰는 대신, RAM과 디스크 사용량을 극적으로 줄여줍니다
    walCompression: true
    
    # 수집한 데이터를 날리지 않고 영구 저장하기 위해 AWS EBS gp3 디스크 5GB 할당
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "gp3"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
              
    # 프로메테우스 파드의 CPU/메모리 자원 할당량
    resources:
      requests:
        cpu: "50m"
        memory: "512Mi"
      limits:
        cpu: "200m"
        memory: "1Gi" 
        
    # 다른 네임스페이스에 있는 모니터링 대상(ServiceMonitor)도 자동으로 찾아서 수집하도록 허용
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

  # 프로메테우스 관리자(오퍼레이터)도 모니터링 전용 노드에 띄우도록 설정
prometheusOperator:
  nodeSelector:
    dedicated: "monitoring"
    node.kubernetes.io/capacity-type: "on-demand"
  tolerations:
    - key: dedicated
      operator: Equal
      value: monitoring
      effect: NoSchedule

prometheus-node-exporter:
  prometheus:
    monitor:
      enabled: true
      # 노드 이름 라벨을 보기 편하게 'node', 'instance'로 덮어쓰기 (가독성 향상)
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: instance
          action: replace

grafana:
  defaultDashboardsEnabled: false
  # 초기 관리자 로그인 비밀번호 세팅
  adminPassword: "Finops!Admin@2026"
  
  # 클러스터 외부(노드 IP)에서도 30000번 포트로 접속할 수 있게 열어둠
  service:
    type: NodePort
    nodePort: 30000

  # AWS ALB(로드밸런서)를 생성하고 도메인(grafana.cyou.monster)을 연결하여 퍼블릭망 접속 허용
  ingress:
    enabled: false 
    ingressClassName: alb
    annotations:
      external-dns.alpha.kubernetes.io/hostname: grafana.cyou.monster
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      alb.ingress.kubernetes.io/scheme: internet-facing      
      alb.ingress.kubernetes.io/target-type: instance        
      alb.ingress.kubernetes.io/group.name: shared-public    
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
      alb.ingress.kubernetes.io/healthcheck-path: /api/health
    hosts:
      - "grafana.cyou.monster"
    paths:
      - /

  # 그라파나 파드 역시 모니터링 전용 노드에 배치
  nodeSelector:
    dedicated: "monitoring"
    "node.kubernetes.io/capacity-type": "spot"

  tolerations:
    - key: dedicated
      operator: Equal
      value: monitoring
      effect: NoSchedule

  # 대시보드 화면 설정 등이 재시작 시 날아가지 않게 디스크(gp3) 500MB 할당, 그라파나 스팟노드로 이동하면서 비활성화
  persistence:
    enabled: false 
#    type: pvc
#    storageClassName: "gp3"
#    size: 500Mi

  # Pending(대기) 방지를 위해 파드가 요구하는 최소 자원(requests)을 낮게 설정
  resources:
    requests:
      cpu: "20m"
      memory: "100Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

  # 그라파나 시스템의 접속 도메인 및 라우팅 환경 설정
  grafana.ini:
    server:
      domain: "grafana.cyou.monster"
      root_url: "%(protocol)s://%(domain)s/"
      serve_from_sub_path: false
    dashboards:
      min_refresh_interval: 1s
    users:
      default_theme: light

  # 특정 라벨이 붙은 K8s ConfigMap만 생성해도, 재시작 없이 대시보드가 자동 추가되도록 하는 기능 활성화
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL

alertmanager:
  # 슬랙/이메일 등 알람 발송 기능은 현재 사용 안 함
  enabled: false

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 50m
      memory: 128Mi